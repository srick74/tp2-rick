<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista Inteligente</title>
  <link rel="stylesheet" href="/Style/style.css">
</head>
<body>

  <div class="container">
    <h1> Lista Inteligente</h1>

    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Escribí una tarea...">
      <button id="addBtn">Agregar</button>
    </div>

    <p id="error" class="error"></p>

    <div class="counters">
      <span>Total: <strong id="total">0</strong></span>
      <span>Completadas: <strong id="completed">0</strong></span>
      <span>Pendientes: <strong id="pending">0</strong></span>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
